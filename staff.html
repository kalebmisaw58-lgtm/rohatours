<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RohaTours | Staff Dashboard</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-stone-50 min-h-screen">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white rounded-[32px] shadow-sm border border-stone-200 p-10 w-full max-w-md">
            <div class="text-center mb-8">
                <span class="text-2xl font-serif font-bold tracking-wider text-[#1B3022]">ROHA<span class="text-[#C5A059]">TOURS</span></span>
                <p class="text-slate-500 text-sm mt-2">Staff Portal</p>
            </div>
            <div id="loginError" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl px-4 py-3"></div>
            <div class="mb-4">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400 block mb-2">Email</label>
                <input id="loginEmail" type="email" placeholder="staff@rohatours.com"
                    class="w-full bg-stone-50 border border-stone-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-[#C5A059] text-sm">
            </div>
            <div class="mb-6">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400 block mb-2">Password</label>
                <input id="loginPassword" type="password" placeholder="••••••••"
                    class="w-full bg-stone-50 border border-stone-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-[#C5A059] text-sm">
            </div>
            <button onclick="handleLogin()" id="loginBtn"
                class="w-full bg-[#1B3022] text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-sm hover:bg-[#2a4a34] transition flex items-center justify-center gap-3">
                <span id="loginBtnText">Sign In</span>
                <div id="loginSpinner" class="hidden w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" class="hidden">
        <nav class="bg-[#1B3022] text-white px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <span class="text-xl font-serif font-bold tracking-wider">ROHA<span class="text-[#C5A059]">TOURS</span>
                <span class="text-sm font-sans font-normal text-slate-400 ml-2">Staff Dashboard</span>
            </span>
            <div class="flex items-center gap-4">
                <span id="staffEmail" class="text-xs text-slate-400 hidden md:block"></span>
                <button onclick="loadBookings()" class="text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-[#C5A059] transition">
                    <i class="fas fa-sync-alt mr-1"></i> Refresh
                </button>
                <button onclick="handleLogout()" class="text-xs font-bold uppercase tracking-widest text-[#C5A059] hover:text-white transition">
                    <i class="fas fa-sign-out-alt mr-1"></i> Logout
                </button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 py-10">
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <div class="bg-white rounded-2xl border border-stone-200 p-6">
                    <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Total</p>
                    <p id="statTotal" class="text-3xl font-serif text-[#1B3022]">—</p>
                </div>
                <div class="bg-white rounded-2xl border border-stone-200 p-6">
                    <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Pending</p>
                    <p id="statPending" class="text-3xl font-serif text-yellow-600">—</p>
                </div>
                <div class="bg-white rounded-2xl border border-stone-200 p-6">
                    <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Confirmed</p>
                    <p id="statConfirmed" class="text-3xl font-serif text-green-600">—</p>
                </div>
                <div class="bg-white rounded-2xl border border-stone-200 p-6">
                    <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Cancelled</p>
                    <p id="statCancelled" class="text-3xl font-serif text-red-500">—</p>
                </div>
            </div>

            <!-- Filter -->
            <div class="flex gap-3 mb-6 flex-wrap">
                <button onclick="filterBookings('all')" data-filter="all" class="filter-btn active-filter px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest border border-stone-200 bg-[#1B3022] text-white transition">All</button>
                <button onclick="filterBookings('pending')" data-filter="pending" class="filter-btn px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest border border-stone-200 hover:bg-stone-100 transition">Pending</button>
                <button onclick="filterBookings('confirmed')" data-filter="confirmed" class="filter-btn px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest border border-stone-200 hover:bg-stone-100 transition">Confirmed</button>
                <button onclick="filterBookings('cancelled')" data-filter="cancelled" class="filter-btn px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest border border-stone-200 hover:bg-stone-100 transition">Cancelled</button>
            </div>

            <!-- Bookings Cards -->
            <div id="bookingsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <!-- Message Modal -->
    <div id="messageModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-4">
        <div class="bg-white rounded-[32px] p-8 w-full max-w-lg shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-serif text-xl text-[#1B3022]">Send Message</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-xl">&times;</button>
            </div>
            <div class="mb-4">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400 block mb-2">To</label>
                <input id="msgTo" type="text" readonly class="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 text-sm text-slate-500">
            </div>
            <div class="mb-4">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400 block mb-2">Subject</label>
                <input id="msgSubject" type="text" class="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-[#C5A059]">
            </div>
            <div class="mb-6">
                <label class="text-xs font-bold uppercase tracking-widest text-slate-400 block mb-2">Message</label>
                <textarea id="msgBody" rows="5" class="w-full bg-stone-50 border border-stone-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-[#C5A059] resize-none"></textarea>
            </div>
            <div class="flex gap-3">
                <button onclick="sendMessage()" class="flex-1 bg-[#1B3022] text-white py-3 rounded-xl font-bold text-sm uppercase tracking-widest hover:bg-[#2a4a34] transition">
                    <i class="fas fa-envelope mr-2"></i> Open in Email
                </button>
                <button onclick="closeModal()" class="px-6 py-3 rounded-xl border border-stone-200 font-bold text-sm hover:bg-stone-50 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SESSION_KEY = 'staff_auth';
        let allBookings = [];
        let currentFilter = 'all';

        function checkAuth() {
            if (sessionStorage.getItem(SESSION_KEY) === 'true') showDashboard();
        }

        function showDashboard() {
            const email = sessionStorage.getItem('staff_email') || '';
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            document.getElementById('staffEmail').textContent = email;
            loadBookings();
        }

        window.handleLogin = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorBox = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const spinner = document.getElementById('loginSpinner');

            btn.disabled = true;
            btnText.textContent = 'Signing in...';
            spinner.classList.remove('hidden');
            errorBox.classList.add('hidden');

            try {
                const res = await fetch('/api/staff-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Invalid credentials.');
                sessionStorage.setItem(SESSION_KEY, 'true');
                sessionStorage.setItem('staff_email', email);
                sessionStorage.setItem('staff_token', password); // store for API calls
                showDashboard();
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Sign In';
                spinner.classList.add('hidden');
            }
        };

        window.handleLogout = () => {
            sessionStorage.removeItem(SESSION_KEY);
            sessionStorage.removeItem('staff_email');
            sessionStorage.removeItem('staff_token');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('loginPassword').value = '';
        };

        window.loadBookings = async () => {
            const grid = document.getElementById('bookingsGrid');
            grid.innerHTML = `<div class="col-span-3 text-center py-16 text-slate-400 text-sm">Loading bookings...</div>`;

            try {
                const token = sessionStorage.getItem('staff_token') || '';
                const res = await fetch('/api/bookings', {
                    headers: { 'X-Staff-Token': token }
                });
                allBookings = await res.json();

                document.getElementById('statTotal').textContent = allBookings.length;
                document.getElementById('statPending').textContent = allBookings.filter(b => b.status === 'pending').length;
                document.getElementById('statConfirmed').textContent = allBookings.filter(b => b.status === 'confirmed').length;
                document.getElementById('statCancelled').textContent = allBookings.filter(b => b.status === 'cancelled').length;

                renderBookings();
            } catch (err) {
                grid.innerHTML = `<div class="col-span-3 text-center py-16 text-red-500 text-sm">Error: ${err.message}</div>`;
            }
        };

        window.filterBookings = (filter) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isActive = btn.dataset.filter === filter;
                btn.classList.toggle('bg-[#1B3022]', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('active-filter', isActive);
            });
            renderBookings();
        };

        function renderBookings() {
            const grid = document.getElementById('bookingsGrid');
            const filtered = currentFilter === 'all' ? allBookings : allBookings.filter(b => b.status === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-3 text-center py-16 text-slate-400 text-sm">No ${currentFilter === 'all' ? '' : currentFilter} bookings found.</div>`;
                return;
            }

            // Sanitize a string for safe HTML insertion
            const esc = (str) => String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

            grid.innerHTML = filtered.map(b => {
                const statusColor = b.status === 'confirmed' ? 'bg-green-100 text-green-800' :
                                    b.status === 'cancelled' ? 'bg-red-100 text-red-800' :
                                    'bg-yellow-100 text-yellow-800';
                const date = b.createdAt ? new Date(b.createdAt).toLocaleDateString() : '—';
                const id = esc(b._id);

                return `
                <div class="bg-white rounded-[24px] border border-stone-200 p-6 flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-serif text-lg text-[#1B3022]">${esc(b.customerName) || '—'}</h3>
                            <p class="text-xs text-slate-400">${esc(b.customerEmail)}</p>
                            ${b.customerPhone ? `<p class="text-xs text-slate-400">${esc(b.customerPhone)}</p>` : ''}
                        </div>
                        <span class="px-3 py-1 text-[10px] font-bold uppercase rounded-full ${statusColor}">${esc(b.status) || 'pending'}</span>
                    </div>

                    <div class="bg-stone-50 rounded-xl p-4 text-sm space-y-1">
                        <p><span class="text-xs font-bold uppercase text-slate-400">Package</span><br>${esc(b.package) || '—'}</p>
                        <p><span class="text-xs font-bold uppercase text-slate-400">Travelers</span> ${esc(b.travelerCount) || '—'}</p>
                        <p><span class="text-xs font-bold uppercase text-slate-400">Travel Date</span> ${esc(b.travelDate) || '—'}</p>
                        <p><span class="text-xs font-bold uppercase text-slate-400">Booked On</span> ${date}</p>
                    </div>

                    <div class="flex gap-2 flex-wrap">
                        ${b.status !== 'confirmed' ? `
                        <button onclick="updateStatus('${id}', 'confirmed')"
                            class="flex-1 bg-green-600 text-white py-2 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-green-700 transition">
                            <i class="fas fa-check mr-1"></i> Approve
                        </button>` : ''}
                        ${b.status !== 'cancelled' ? `
                        <button onclick="updateStatus('${id}', 'cancelled')"
                            class="flex-1 bg-red-50 text-red-600 border border-red-200 py-2 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-red-100 transition">
                            <i class="fas fa-times mr-1"></i> Cancel
                        </button>` : ''}
                        <button onclick="openMessage('${esc(b.customerEmail)}', '${esc(b.customerName)}', '${esc(b.package)}', '${esc(b.status)}')"
                            class="flex-1 bg-stone-100 text-[#1B3022] py-2 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-stone-200 transition">
                            <i class="fas fa-envelope mr-1"></i> Message
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        window.updateStatus = async (id, status) => {
            try {
                const token = sessionStorage.getItem('staff_token') || '';
                const res = await fetch('/api/update-booking', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'X-Staff-Token': token },
                    body: JSON.stringify({ id, status })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Update failed');
                await loadBookings();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        };

        window.openMessage = (email, name, pkg, status) => {
            const subject = status === 'confirmed'
                ? `Your RohaTours Booking is Confirmed — ${pkg}`
                : `Update on Your RohaTours Booking — ${pkg}`;
            const body = status === 'confirmed'
                ? `Dear ${name},\n\nWe are delighted to confirm your booking for ${pkg}.\n\nOur team will be in touch shortly with full itinerary details and next steps.\n\nWarm regards,\nRohaTours Team`
                : `Dear ${name},\n\nThank you for your interest in ${pkg}.\n\nWe wanted to reach out regarding your booking request.\n\n\n\nWarm regards,\nRohaTours Team`;

            document.getElementById('msgTo').value = email;
            document.getElementById('msgSubject').value = subject;
            document.getElementById('msgBody').value = body;
            document.getElementById('messageModal').classList.remove('hidden');
        };

        window.sendMessage = () => {
            const to = document.getElementById('msgTo').value;
            const subject = encodeURIComponent(document.getElementById('msgSubject').value);
            const body = encodeURIComponent(document.getElementById('msgBody').value);
            window.open(`mailto:${to}?subject=${subject}&body=${body}`);
            closeModal();
        };

        window.closeModal = () => {
            document.getElementById('messageModal').classList.add('hidden');
        };

        document.getElementById('loginPassword').addEventListener('keydown', e => {
            if (e.key === 'Enter') window.handleLogin();
        });

        checkAuth();
    </script>
</body>
</html>
